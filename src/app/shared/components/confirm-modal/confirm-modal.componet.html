<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" (click)="cancel()">
    <div class="bg-slate-900 border border-white/10 rounded-2xl shadow-2xl w-full max-w-sm p-6"
        (click)="$event.stopPropagation()">

        <!-- Icon -->
        <div class="w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4"
            [ngClass]="danger ? 'bg-red-500/10 border border-red-500/20' : 'bg-blue-500/10 border border-blue-500/20'">
            <svg *ngIf="danger" class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
            </svg>
            <svg *ngIf="!danger" class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>

        <h3 class="text-white font-semibold text-center mb-2">{{ title }}</h3>
        <p class="text-slate-400 text-sm text-center mb-6 leading-relaxed">{{ message }}</p>

        <div class="flex gap-2">
            <button (click)="cancel()"
                class="flex-1 bg-white/5 hover:bg-white/10 text-slate-300 py-2.5 rounded-xl text-sm font-medium transition-all">
                {{ cancelLabel }}
            </button>
            <button (click)="confirm()" class="flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all" [ngClass]="danger
          ? 'bg-red-600 hover:bg-red-500 text-white'
          : 'bg-blue-600 hover:bg-blue-500 text-white'">
                {{ confirmLabel }}
            </button>
        </div>
    </div>
</div>
