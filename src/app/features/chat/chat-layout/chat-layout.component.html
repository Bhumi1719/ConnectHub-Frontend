<div class="flex h-screen bg-slate-950 overflow-hidden">

    <!-- ═══════════════════════════════════════
       SIDEBAR
  ═══════════════════════════════════════ -->
    <aside class="w-70 min-w-70 flex flex-col bg-slate-900 border-r border-white/[0.06] relative z-10">

        <!-- TOP: Logo + Back -->
        <div class="flex items-center justify-between px-4 py-4 border-b border-white/[0.06]">
            <div class="flex items-center gap-2.5">
                <div
                    class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-600/30 shrink-0">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a2 2 0 01-2-2v-1M7 8H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l4-4h4a2 2 0 002-2V8a2 2 0 00-2-2H7z" />
                    </svg>
                </div>
                <span class="text-white font-bold text-sm tracking-tight">ConnectHub</span>
            </div>

            <div class="flex items-center gap-1">
                <app-notification-bell></app-notification-bell>
                <!-- Back to dashboard -->
                <button (click)="goToDashboard()" title="Back to Dashboard"
                    class="w-7 h-7 rounded-lg flex items-center justify-center text-slate-500 hover:text-white hover:bg-white/10 transition-all duration-150">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Create Room button -->
        <div class="px-3 pt-3 pb-2">
            <button (click)="openCreateModal()"
                class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 text-white text-xs font-semibold py-2.5 rounded-xl transition-all duration-150 shadow-lg shadow-blue-600/20">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
                </svg>
                New Room
            </button>
        </div>

        <!-- Room list (search + tabs + items) -->
        <div class="flex-1 min-h-0 flex flex-col overflow-hidden">
            <app-room-list></app-room-list>
        </div>

        <!-- BOTTOM: User info + logout -->
        <div class="border-t border-white/[0.06] px-3 py-3">
            <div class="flex items-center gap-2.5">
                <!-- Clickable avatar + name → profile -->
                <button (click)="goToProfile()"
                    class="flex items-center gap-2.5 flex-1 min-w-0 rounded-xl px-1 py-1 hover:bg-white/5 transition-all text-left">
                    <div
                        class="w-8 h-8 rounded-full bg-blue-500/30 border border-blue-400/20 flex items-center justify-center text-blue-300 text-xs font-bold shrink-0">
                        {{ getInitial(authStore.currentUser()?.username || '') }}
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-white text-xs font-semibold truncate">{{ authStore.currentUser()?.username }}</p>
                        <p class="text-slate-500 text-[10px] truncate">{{ authStore.currentUser()?.email }}</p>
                    </div>
                </button>

                <!-- Logout -->
                <button (click)="logout()" title="Sign out"
                    class="w-7 h-7 rounded-lg flex items-center justify-center text-slate-500 hover:text-red-400 hover:bg-red-500/10 transition-all shrink-0">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </button>
            </div>
        </div>
    </aside>

    <!-- ═══════════════════════════════════════
       MAIN CONTENT AREA
  ═══════════════════════════════════════ -->
    <main class="flex-1 flex flex-col min-w-0 bg-slate-950 relative overflow-hidden">

        <router-outlet></router-outlet>
        <ng-container *ngIf="roomStore.activeRoomId()">
        </ng-container>

        <div *ngIf="!roomStore.activeRoomId()"
            class="absolute inset-0 flex flex-col items-center justify-center text-center px-8">
            <div class="w-20 h-20 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center mb-5">
                <svg class="w-10 h-10 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
            </div>
            <h3 class="text-white font-semibold text-lg mb-2">Pick a conversation</h3>
            <p class="text-slate-500 text-sm max-w-xs">Select a room from the sidebar or create a new one to start
                chatting.
            </p>
        </div>

    </main>

    <!-- ═══════════════════════════════════════
       CREATE ROOM MODAL
  ═══════════════════════════════════════ -->
    <div *ngIf="showCreateModal" class="fixed inset-0 z-50 flex items-center justify-center p-4"
        (click)="closeCreateModal()">

        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

        <!-- Modal card -->
        <div class="relative bg-slate-900 border border-white/10 rounded-2xl shadow-2xl w-full max-w-sm p-6"
            (click)="$event.stopPropagation()">

            <div class="flex items-center justify-between mb-5">
                <h3 class="text-white font-semibold">Create New Room</h3>
                <button (click)="closeCreateModal()"
                    class="w-7 h-7 rounded-lg flex items-center justify-center text-slate-500 hover:text-white hover:bg-white/10 transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="space-y-3">
                <div>
                    <label class="text-slate-400 text-xs mb-1.5 block">Room Name <span
                            class="text-red-400">*</span></label>
                    <input [(ngModel)]="newRoomName" placeholder="e.g. Design Team"
                        class="w-full bg-white/5 border border-white/10 text-white placeholder-slate-500 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all" />
                </div>
                <div>
                    <label class="text-slate-400 text-xs mb-1.5 block">Description</label>
                    <input [(ngModel)]="newRoomDesc" placeholder="What's this room about?"
                        class="w-full bg-white/5 border border-white/10 text-white placeholder-slate-500 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all" />
                </div>

                <div *ngIf="createError"
                    class="flex items-center gap-2 bg-red-500/10 border border-red-500/20 rounded-xl px-3 py-2.5">
                    <p class="text-red-400 text-xs">{{ createError }}</p>
                </div>

                <div class="flex gap-2 pt-1">
                    <button (click)="closeCreateModal()"
                        class="flex-1 bg-white/5 hover:bg-white/10 text-slate-300 py-2.5 rounded-xl text-sm font-medium transition-all">
                        Cancel
                    </button>
                    <button (click)="createRoom()" [disabled]="creating || !newRoomName.trim()"
                        class="flex-1 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed text-white py-2.5 rounded-xl text-sm font-semibold transition-all">
                        <span *ngIf="!creating">Create</span>
                        <span *ngIf="creating" class="flex items-center justify-center gap-1.5">
                            <svg class="animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4" />
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
                            </svg>
                            Creating...
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>
