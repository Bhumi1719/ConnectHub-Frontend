<button (click)="select()" [routerLink]="['/chat/room', room.roomId]"
  class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-150 group text-left"
  [class.bg-blue-600]="isActive"
  [class.hover:bg-white]="isActive"
  [class.hover:bg-opacity-10]="!isActive"
  [ngClass]="isActive ? 'bg-blue-600/20 border border-blue-500/30' : 'hover:bg-white/5 border border-transparent'">

  <!-- Avatar -->
  <div class="relative shrink-0">
    <div class="w-10 h-10 rounded-xl flex items-center justify-center text-sm font-bold shadow-sm"
      [ngClass]="room.type === 'GROUP'
        ? 'bg-cyan-500/20 text-cyan-300 border border-cyan-500/30'
        : 'bg-violet-500/20 text-violet-300 border border-violet-500/30'">
      {{ getInitial(roomName) }}
    </div>
    <!-- DM online dot -->
    <span *ngIf="room.type === 'DM' && dmPartnerId"

        class="absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full border-2 border-slate-900"
        [ngClass]="presenceService.getStatusColor(dmPartnerId)"></span>
  </div>

  <!-- Info -->
  <div class="flex-1 min-w-0">
    <div class="flex items-center justify-between gap-1">
      <p class="text-sm font-semibold truncate"
        [class.text-white]="isActive"
        [class.text-slate-200]="!isActive">
        {{ roomName }}
      </p>
      <span *ngIf="room.lastMessageTime" class="text-slate-500 text-[10px] shrink-0">
        {{ room.lastMessageTime }}
      </span>
    </div>
    <!-- <p class="text-xs truncate mt-0.5" [class.text-blue-200]="isActive" [class.text-slate-500]="!isActive">
      {{ room.lastMessageTime ? '' : 'No messages yet' }}
    </p> -->
  </div>

  <!-- Unread badge -->
  <span *ngIf="room.unreadCount && room.unreadCount > 0"
    class="shrink-0 min-w-5 h-5 px-1.5 bg-blue-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center">
    {{ room.unreadCount > 99 ? '99+' : room.unreadCount }}
  </span>
</button>
