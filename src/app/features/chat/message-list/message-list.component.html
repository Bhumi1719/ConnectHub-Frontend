<div #scrollContainer style="flex:1; min-height:0; overflow-y:auto; height:0;"
    class="px-4 py-4 space-y-1 scrollbar-thin scrollbar-thumb-white/10 scrollbar-track-transparent">
    <!-- Top sentinel for IntersectionObserver -->
    <div #topSentinel class="h-1"></div>

    <!-- Load more indicator -->
    <div *ngIf="loading" class="flex justify-center py-3">
        <svg class="animate-spin w-4 h-4 text-blue-400" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
        </svg>
    </div>

    <!-- All messages loaded -->
    <div *ngIf="!hasMore && messages.length > 0" class="text-center text-slate-600 text-xs py-2">
        Beginning of conversation
    </div>

    <!-- Empty state -->
    <div *ngIf="!loading && messages.length === 0" class="flex flex-col items-center justify-center h-full text-center">
        <div class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center mb-3">
            <svg class="w-7 h-7 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
            </svg>
        </div>
        <p class="text-slate-400 text-sm font-medium">No messages yet</p>
        <p class="text-slate-600 text-xs mt-1">Be the first to say something!</p>
    </div>

    <!-- Message bubbles -->
    <app-message-bubble *ngFor="let message of messages; trackBy: trackByMessageId" [message]="message"
        [isOwn]="isOwnMessage(message.senderId)" [isAdmin]="isAdmin" [isDm]="isDm"
        (deleteMessage)="deleteMessage.emit($event)" (editMessage)="editMessage.emit($event)">
    </app-message-bubble>

</div>
