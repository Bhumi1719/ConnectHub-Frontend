<!-- Thumbnail -->
<div class="mt-1 rounded-xl overflow-hidden cursor-pointer max-w-xs group relative" (click)="open()">

    <!-- Error fallback -->
    <div *ngIf="imgError()"
        class="w-full h-32 flex flex-col items-center justify-center gap-2 bg-white/5 rounded-xl border border-white/10">
        <svg class="w-6 h-6 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <p class="text-slate-500 text-xs">{{ filename }}</p>
    </div>

    <img *ngIf="!imgError()" [src]="_thumbUrl || _fullUrl" [alt]="filename" (error)="onError()"
        class="w-full max-h-52 object-cover rounded-xl group-hover:brightness-90 transition-all" />

    <div *ngIf="!imgError()"
        class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
        <div class="bg-black/40 rounded-full p-2">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />
            </svg>
        </div>
    </div>
</div>

<!-- Lightbox -->
<div *ngIf="lightboxOpen()"
    class="fixed inset-0 z-[200] flex items-center justify-center bg-black/90 backdrop-blur-sm p-4" (click)="close()">
    <button
        class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center text-white transition-all z-10">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
    </button>
    <img [src]="_fullUrl" [alt]="filename" class="max-w-full max-h-[90vh] object-contain rounded-xl shadow-2xl"
        (click)="$event.stopPropagation()" />
    <p class="absolute bottom-4 text-white/60 text-sm">{{ filename }}</p>
</div>
