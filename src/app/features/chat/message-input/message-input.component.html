<div class="px-4 pb-4 pt-2">

    <!-- ── File/Image preview bar ── -->
    <div *ngIf="pendingFile"
        class="mb-2 flex items-center gap-3 bg-white/5 border border-white/10 rounded-xl px-3 py-2.5">

        <!-- Image thumbnail (local blob preview) -->
        <div *ngIf="pendingFile.isImage" class="relative shrink-0">
            <img [src]="pendingFile.previewUrl" class="w-14 h-14 object-cover rounded-lg border border-white/10"
                [alt]="pendingFile.file.name" />
        </div>

        <!-- File icon for non-images -->
        <div *ngIf="!pendingFile.isImage"
            class="w-12 h-12 shrink-0 rounded-lg bg-blue-500/20 border border-blue-500/30 flex items-center justify-center">
            <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
            </svg>
        </div>

        <!-- File info -->
        <div class="flex-1 min-w-0">
            <p class="text-white text-xs font-medium truncate">{{ pendingFile.file.name }}</p>
            <p class="text-slate-500 text-xs mt-0.5">{{ fileSizeKb }} KB</p>
            <!-- Upload progress bar -->
            <div *ngIf="uploading()" class="mt-1.5 w-full h-1 bg-white/10 rounded-full overflow-hidden">
                <div class="h-full bg-blue-500 rounded-full transition-all duration-200"
                    [style.width.%]="uploadProgress()"></div>
            </div>
        </div>

        <!-- Cancel button (only when not uploading) -->
        <button *ngIf="!uploading()" (click)="cancelPendingFile()"
            class="shrink-0 w-6 h-6 rounded-full bg-white/10 hover:bg-red-500/20 flex items-center justify-center text-slate-400 hover:text-red-400 transition-all">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>

    <!-- ── Input row ── -->
    <div class="flex items-end gap-2 bg-white/5 border border-white/10 rounded-2xl px-3 py-2
        focus-within:border-blue-500/50 focus-within:ring-1 focus-within:ring-blue-500/20 transition-all">

        <!-- File picker (hidden while a file is already pending) -->
        <app-file-upload-button *ngIf="!pendingFile" [roomId]="roomId" [uploaderId]="uploaderId"
            (fileSelected)="onFileSelected($event)" class="mb-0.5">
        </app-file-upload-button>

        <!-- Placeholder clip icon while file pending -->
        <div *ngIf="pendingFile" class="mb-0.5 w-8 h-8 flex items-center justify-center text-slate-600">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
            </svg>
        </div>

        <!-- Text area -->
        <textarea [value]="content()" (input)="onInput($any($event.target).value)" (keydown)="onKeydown($event)"
            [disabled]="!!pendingFile || uploading()" placeholder="Message..." rows="1"
            class="flex-1 bg-transparent text-slate-100 placeholder-slate-600 text-sm outline-none resize-none
            max-h-32 overflow-y-auto scrollbar-thin scrollbar-thumb-white/10 py-1.5 leading-relaxed disabled:opacity-40">
        </textarea>

        <!-- Emoji picker -->
        <div class="relative shrink-0 mb-0.5">
            <div *ngIf="showEmojiPicker()" class="fixed inset-0 z-[90]" (click)="closeEmojiPicker()"></div>
            <button (click)="toggleEmojiPicker()" [disabled]="!!pendingFile || uploading()"
                class="w-8 h-8 flex items-center justify-center rounded-xl transition-all disabled:opacity-40"
                [ngClass]="showEmojiPicker()
                    ? 'text-blue-400 bg-blue-500/10'
                    : 'text-slate-500 hover:text-slate-300 hover:bg-white/10'">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </button>
            <div *ngIf="showEmojiPicker()"
                class="absolute bottom-10 right-0 w-64 bg-slate-800 border border-white/10 rounded-2xl shadow-2xl p-3 z-[100]">
                <div class="grid grid-cols-8 gap-1">
                    <button *ngFor="let emoji of emojis" (click)="insertEmoji(emoji)"
                        class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-white/10 transition-all text-base">
                        {{ emoji }}
                    </button>
                </div>
            </div>
        </div>

        <!-- Send button -->
        <button (click)="send()" [disabled]="!canSend"
            class="shrink-0 w-8 h-8 flex items-center justify-center rounded-xl transition-all mb-0.5" [ngClass]="canSend
                ? 'bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-600/20'
                : 'bg-white/5 text-slate-600 cursor-not-allowed'">
            <!-- Spinner while uploading -->
            <svg *ngIf="uploading()" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
            </svg>
            <!-- Send arrow -->
            <svg *ngIf="!uploading()" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
        </button>
    </div>

    <p class="text-slate-700 text-[10px] text-center mt-1.5">Enter to send · Shift+Enter for new line</p>
</div>
