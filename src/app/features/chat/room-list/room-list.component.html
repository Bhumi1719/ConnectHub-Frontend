<div class="flex flex-col flex-1 min-h-0 overflow-hidden">
    <!-- Search -->
    <div class="px-3 mb-3">
        <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-500" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" placeholder="Search rooms..." [value]="roomStore.searchQuery()"
                (input)="onSearch($any($event.target).value)"
                class="w-full bg-white/5 border border-white/10 text-slate-200 placeholder-slate-600 text-xs rounded-lg pl-8 pr-3 py-2 outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/30 transition-all" />
        </div>
    </div>

    <!-- Tabs -->
    <div class="flex gap-1 px-3 mb-3">
        <button *ngFor="let tab of tabs" (click)="setTab(tab)"
            class="flex-1 py-1.5 rounded-lg text-xs font-medium transition-all duration-150 capitalize" [ngClass]="roomStore.activeTab() === tab
        ? 'bg-blue-600 text-white shadow-sm'
        : 'text-slate-400 hover:text-slate-200 hover:bg-white/5'">
            {{ tab === 'private' ? 'DMs' : tab === 'group' ? 'Groups' : 'All' }}
        </button>
    </div>

    <!-- Room list -->
    <div
        class="min-h-0 flex-1 overflow-y-auto px-2 space-y-0.5 scrollbar-thin scrollbar-thumb-white/10 scrollbar-track-transparent">

        <!-- Loading -->
        <div *ngIf="loading" class="flex flex-col items-center justify-center py-12 gap-3">
            <svg class="animate-spin w-5 h-5 text-blue-400" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
            </svg>
            <p class="text-slate-600 text-xs">Loading rooms...</p>
        </div>

        <!-- Empty -->
        <div *ngIf="!loading && roomStore.filteredRooms().length === 0"
            class="flex flex-col items-center justify-center py-12 text-center px-4">
            <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center mb-3">
                <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
            </div>
            <p class="text-slate-500 text-xs">No rooms found</p>
        </div>

        <!-- Items -->
        <ng-container *ngIf="!loading">
            <app-room-item *ngFor="let room of roomStore.filteredRooms(); trackBy: trackByRoomId" [room]="room">
            </app-room-item>
        </ng-container>
    </div>
</div>
