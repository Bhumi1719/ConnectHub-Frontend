<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
    (click)="close.emit()">
    <div class="relative bg-slate-900 border border-white/10 rounded-2xl shadow-2xl w-full max-w-md"
        (click)="$event.stopPropagation()">

        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-white/[0.06]">
            <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-lg bg-red-500/15 border border-red-500/25 flex items-center justify-center">
                    <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 7a4 4 0 11-8 0 4 4 0 018 0zM9 14a6 6 0 00-6 6v1h12v-1a6 6 0 00-6-6zM21 12h-6" />
                    </svg>
                </div>
                <div>
                    <h3 class="text-white font-semibold text-sm">Manage Members</h3>
                    <p class="text-slate-500 text-[11px]">{{ members().length }} member{{ members().length !== 1 ? 's' :
                        '' }}</p>
                </div>
            </div>
            <button (click)="close.emit()"
                class="w-7 h-7 rounded-lg flex items-center justify-center text-slate-500 hover:text-white hover:bg-white/10 transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Members list -->
        <div class="px-3 py-3 max-h-[420px] overflow-y-auto scrollbar-thin scrollbar-thumb-white/10">

            <!-- Empty -->
            <div *ngIf="members().length === 0" class="flex flex-col items-center justify-center py-10 text-center">
                <p class="text-slate-500 text-sm">No other members to manage.</p>
            </div>

            <div *ngFor="let member of members()"
                class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/[0.04] transition-all border border-transparent hover:border-white/[0.06]">

                <!-- Avatar -->
                <div class="relative shrink-0">
                    <img *ngIf="member.avatarUrl" [src]="member.avatarUrl"
                        class="w-9 h-9 rounded-full object-cover border border-white/10" />
                    <div *ngIf="!member.avatarUrl"
                        class="w-9 h-9 rounded-full bg-slate-700 border border-white/10 flex items-center justify-center text-slate-300 text-sm font-bold">
                        {{ getInitial(member.username) }}
                    </div>
                    <span class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 rounded-full border-2 border-slate-900"
                        [ngClass]="member.isOnline ? 'bg-emerald-400' : 'bg-slate-600'"></span>
                </div>

                <!-- Info -->
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-1.5">
                        <p class="text-white text-sm font-medium truncate">{{ member.username }}</p>
                        <!-- <span *ngIf="member.isMuted"
                            class="text-[9px] text-slate-500 bg-slate-800 border border-white/10 px-1.5 py-0.5 rounded-md">MUTED</span> -->
                    </div>
                    <p class="text-slate-500 text-xs truncate">{{ member.email }}</p>
                </div>

                <!-- Controls -->
                <div class="flex items-center gap-1.5 shrink-0">

                    <!-- Role selector -->
                    <select [value]="member.role" (change)="changeRole(member, $any($event.target).value)"
                        class="bg-slate-800 border border-white/10 text-slate-300 text-xs rounded-lg px-2 py-1.5 outline-none focus:border-blue-500/50 cursor-pointer">
                        <option value="MEMBER">Member</option>
                        <option value="ADMIN">Admin</option>
                    </select>

                    <!-- Mute toggle -->
                    <!-- <button (click)="toggleMute(member)" [title]="member.isMuted ? 'Unmute' : 'Mute'"
                        class="w-7 h-7 rounded-lg flex items-center justify-center transition-all" [ngClass]="member.isMuted
              ? 'bg-amber-500/15 border border-amber-500/25 text-amber-400 hover:bg-amber-500/25'
              : 'bg-white/5 border border-white/10 text-slate-500 hover:text-slate-300 hover:bg-white/10'">
                        <svg *ngIf="!member.isMuted" class="w-3.5 h-3.5" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                        </svg>
                        <svg *ngIf="member.isMuted" class="w-3.5 h-3.5" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
                        </svg>
                    </button> -->

                    <!-- Remove -->
                    <button (click)="remove(member)" [disabled]="processingIds.has(member.userId)"
                        class="w-7 h-7 rounded-lg flex items-center justify-center bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500/20 disabled:opacity-40 disabled:cursor-not-allowed transition-all">
                        <svg *ngIf="!processingIds.has(member.userId)" class="w-3.5 h-3.5" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M6 18L18 6M6 6l12 12" />
                        </svg>
                        <svg *ngIf="processingIds.has(member.userId)" class="animate-spin w-3.5 h-3.5" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
