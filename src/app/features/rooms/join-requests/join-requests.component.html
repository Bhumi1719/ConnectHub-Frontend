<!-- Backdrop -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
    (click)="close.emit()">

    <!-- Panel -->
    <div class="relative bg-slate-900 border border-white/10 rounded-2xl shadow-2xl w-full max-w-md"
        (click)="$event.stopPropagation()">

        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-white/[0.06]">
            <div class="flex items-center gap-2.5">
                <div
                    class="w-8 h-8 rounded-lg bg-amber-500/15 border border-amber-500/25 flex items-center justify-center">
                    <svg class="w-4 h-4 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                    </svg>
                </div>
                <div>
                    <h3 class="text-white font-semibold text-sm">Join Requests</h3>
                    <p class="text-slate-500 text-[11px]">
                        {{ pendingCount }} pending {{ pendingCount === 1 ? 'request' : 'requests' }}
                    </p>
                </div>
            </div>
            <button (click)="close.emit()"
                class="w-7 h-7 rounded-lg flex items-center justify-center text-slate-500 hover:text-white hover:bg-white/10 transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Body -->
        <div class="px-4 py-3 max-h-[420px] overflow-y-auto scrollbar-thin scrollbar-thumb-white/10">

            <!-- Loading -->
            <div *ngIf="loading" class="flex flex-col items-center justify-center py-12 gap-3">
                <svg class="animate-spin w-5 h-5 text-amber-400" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
                </svg>
                <p class="text-slate-500 text-xs">Loading requests...</p>
            </div>

            <!-- Empty state -->
            <div *ngIf="!loading && requests().length === 0"
                class="flex flex-col items-center justify-center py-12 text-center">
                <div
                    class="w-14 h-14 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center mb-3">
                    <svg class="w-7 h-7 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <p class="text-slate-400 text-sm font-medium">All caught up!</p>
                <p class="text-slate-600 text-xs mt-1">No pending join requests</p>
            </div>

            <!-- Request list -->
            <div *ngIf="!loading && requests().length > 0" class="space-y-2">
                <div *ngFor="let req of requests()"
                    class="flex items-center gap-3 bg-white/[0.04] border border-white/[0.06] rounded-xl px-4 py-3 hover:bg-white/[0.07] transition-all">

                    <!-- Avatar -->
                    <div class="shrink-0">
                        <img *ngIf="req.avatarUrl" [src]="req.avatarUrl"
                            class="w-9 h-9 rounded-full object-cover border border-white/10" />
                        <div *ngIf="!req.avatarUrl"
                            class="w-9 h-9 rounded-full bg-blue-500/25 border border-blue-400/20 flex items-center justify-center text-blue-300 text-sm font-bold">
                            {{ getInitial(req.username) }}
                        </div>
                    </div>

                    <!-- Info -->
                    <div class="flex-1 min-w-0">
                        <p class="text-white text-sm font-medium truncate">{{ req.username }}</p>
                        <p class="text-slate-500 text-[11px] mt-0.5">
                            Requested {{ req.requestedAt | date:'MMM d, h:mm a' }}
                        </p>
                    </div>

                    <!-- Actions -->
                    <div class="flex items-center gap-1.5 shrink-0">
                        <!-- Reject -->
                        <button (click)="reject(req)" [disabled]="processingIds.has(req.userId)" class="w-8 h-8 rounded-lg flex items-center justify-center bg-red-500/10 border border-red-500/20
                text-red-400 hover:bg-red-500/20 disabled:opacity-40 disabled:cursor-not-allowed transition-all">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                    d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                        <!-- Approve -->
                        <button (click)="approve(req)" [disabled]="processingIds.has(req.userId)"
                            class="w-8 h-8 rounded-lg flex items-center justify-center bg-emerald-500/10 border border-emerald-500/20
                text-emerald-400 hover:bg-emerald-500/20 disabled:opacity-40 disabled:cursor-not-allowed transition-all">
                            <svg *ngIf="!processingIds.has(req.userId)" class="w-3.5 h-3.5" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                    d="M5 13l4 4L19 7" />
                            </svg>
                            <svg *ngIf="processingIds.has(req.userId)" class="animate-spin w-3.5 h-3.5" fill="none"
                                viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4" />
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
                            </svg>
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="px-6 py-3 border-t border-white/[0.06]">
            <button (click)="loadRequests()"
                class="w-full text-slate-500 hover:text-slate-300 text-xs py-1.5 rounded-lg hover:bg-white/5 transition-all flex items-center justify-center gap-1.5">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                Refresh
            </button>
        </div>

    </div>
</div>
