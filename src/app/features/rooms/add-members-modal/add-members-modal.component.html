<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
    (click)="close.emit()">
    <div class="relative bg-slate-900 border border-white/10 rounded-2xl shadow-2xl w-full max-w-md"
        (click)="$event.stopPropagation()">

        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-white/[0.06]">
            <div class="flex items-center gap-2.5">
                <div
                    class="w-8 h-8 rounded-lg bg-blue-500/15 border border-blue-500/25 flex items-center justify-center">
                    <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                    </svg>
                </div>
                <h3 class="text-white font-semibold text-sm">Add Members</h3>
            </div>
            <button (click)="close.emit()"
                class="w-7 h-7 rounded-lg flex items-center justify-center text-slate-500 hover:text-white hover:bg-white/10 transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Search input -->
        <div class="px-5 pt-4 pb-2">
            <div class="relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-500" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input [formControl]="searchControl" type="text" placeholder="Search by name or username..."
                    class="w-full bg-white/5 border border-white/10 text-white placeholder-slate-500 text-sm rounded-xl pl-9 pr-4 py-2.5 outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/30 transition-all" />
                <svg *ngIf="searching"
                    class="absolute right-3 top-1/2 -translate-y-1/2 animate-spin w-3.5 h-3.5 text-blue-400" fill="none"
                    viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
                </svg>
            </div>
        </div>

        <!-- Results -->
        <div class="px-3 pb-4 max-h-80 overflow-y-auto scrollbar-thin scrollbar-thumb-white/10">

            <!-- Empty / prompt -->
            <div *ngIf="results().length === 0 && !searching"
                class="flex flex-col items-center justify-center py-10 text-center">
                <svg class="w-8 h-8 text-slate-700 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <p class="text-slate-500 text-xs">Search for users to add</p>
            </div>

            <!-- User rows -->
            <div *ngFor="let user of results()"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-white/[0.04] transition-all">

                <!-- Avatar -->
                <div class="shrink-0">
                    <img *ngIf="user.avatarUrl" [src]="user.avatarUrl"
                        class="w-9 h-9 rounded-full object-cover border border-white/10" />
                    <div *ngIf="!user.avatarUrl"
                        class="w-9 h-9 rounded-full bg-blue-500/25 border border-blue-400/20 flex items-center justify-center text-blue-300 text-sm font-bold">
                        {{ getInitial(user.username) }}
                    </div>
                </div>

                <!-- Info -->
                <div class="flex-1 min-w-0">
                    <p class="text-white text-sm font-medium truncate">{{ user.username }}</p>
                    <p class="text-slate-500 text-xs truncate">{{ user.email }}</p>
                </div>

                <!-- Action -->
                <div class="shrink-0">
                    <span *ngIf="isAlreadyMember(user.userId)"
                        class="text-slate-600 text-xs px-3 py-1.5 rounded-lg bg-white/5 border border-white/[0.06]">
                        In room
                    </span>
                    <button *ngIf="!isAlreadyMember(user.userId)" (click)="addMember(user)"
                        [disabled]="addingIds.has(user.userId)"
                        class="flex items-center gap-1.5 bg-blue-600/20 hover:bg-blue-600/30 border border-blue-500/30 text-blue-300 px-3 py-1.5 rounded-lg text-xs font-medium transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg *ngIf="!addingIds.has(user.userId)" class="w-3 h-3" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M12 4v16m8-8H4" />
                        </svg>
                        <svg *ngIf="addingIds.has(user.userId)" class="animate-spin w-3 h-3" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
                        </svg>
                        {{ addingIds.has(user.userId) ? 'Adding...' : 'Add' }}
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
