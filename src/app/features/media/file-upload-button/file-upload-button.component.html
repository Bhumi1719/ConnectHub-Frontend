<div class="relative">
    <!-- Hidden file input -->
    <input #fileInput type="file" accept="image/jpeg,image/png,image/gif,image/webp,application/pdf,.docx,.zip,.txt"
        class="hidden" (change)="onFileSelected($event)" />

    <!-- Attach button -->
    <button type="button" (click)="openPicker()" title="Attach file"
        class="w-8 h-8 flex items-center justify-center rounded-xl transition-all text-slate-500 hover:text-slate-300 hover:bg-white/10">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
        </svg>
    </button>
</div>
