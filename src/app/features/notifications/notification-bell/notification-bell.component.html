<div class="relative">
    <button (click)="toggle()"
        class="w-9 h-9 rounded-xl flex items-center justify-center relative transition-all duration-150" [ngClass]="open
      ? 'bg-blue-600/20 border border-blue-500/30 text-blue-300'
      : 'text-slate-400 hover:text-white hover:bg-white/10'">
        <svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>
        <!-- Badge -->
        <span *ngIf="notificationStore.unreadCount() > 0"
            class="absolute -top-1 -right-1 min-w-4 h-4 px-1 bg-red-500 text-white text-[9px] font-bold rounded-full flex items-center justify-center border border-slate-900">
            {{ notificationStore.unreadCount() > 99 ? '99+' : notificationStore.unreadCount() }}
        </span>
    </button>

    <!-- Panel -->
    <app-notification-panel *ngIf="open" (closePanel)="close()">
    </app-notification-panel>
</div>
