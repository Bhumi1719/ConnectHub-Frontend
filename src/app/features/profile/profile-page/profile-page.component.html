<div class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900">

    <!-- Blobs -->
    <div
        class="fixed top-0 left-0 w-96 h-96 bg-blue-600 opacity-[0.06] rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2 pointer-events-none">
    </div>

    <!-- Top nav -->
    <nav class="border-b border-white/[0.06] bg-white/[0.03] backdrop-blur-xl px-6 py-3.5 flex items-center gap-3">
        <button (click)="goBack()"
            class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/10 transition-all">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </button>
        <h1 class="text-white font-semibold">Profile Settings</h1>
    </nav>

    <div class="max-w-2xl mx-auto px-4 py-8 space-y-6">

        <!-- ── AVATAR + STATUS ── -->
        <div class="bg-white/[0.04] border border-white/[0.08] rounded-2xl p-6">
            <div class="flex items-center gap-5">

                <!-- Avatar -->
                <div class="relative group shrink-0">
                    <img *ngIf="authStore.currentUser()?.avatarUrl" [src]="authStore.currentUser()?.avatarUrl"
                        class="w-20 h-20 rounded-2xl object-cover border-2 border-white/10" />
                    <div *ngIf="!authStore.currentUser()?.avatarUrl"
                        class="w-20 h-20 rounded-2xl bg-blue-600/30 border-2 border-blue-400/20 flex items-center justify-center text-blue-300 text-2xl font-bold">
                        {{ getInitial(authStore.currentUser()?.username || '') }}
                    </div>

                    <!-- Upload overlay -->
                    <label
                        class="absolute inset-0 rounded-2xl flex items-center justify-center bg-black/50 opacity-0 group-hover:opacity-100 cursor-pointer transition-opacity">
                        <svg *ngIf="!uploadingAvatar()" class="w-6 h-6 text-white" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <svg *ngIf="uploadingAvatar()" class="animate-spin w-6 h-6 text-white" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
                        </svg>
                        <input type="file" accept="image/*" class="hidden" (change)="onAvatarSelected($event)" />
                    </label>

                    <!-- Progress ring -->
                    <div *ngIf="uploadingAvatar()"
                        class="absolute inset-0 rounded-2xl border-2 border-blue-500/60 animate-pulse"></div>
                </div>

                <div class="flex-1 min-w-0">
                    <h2 class="text-white font-bold text-lg truncate">{{ authStore.currentUser()?.username }}</h2>
                    <p class="text-slate-400 text-sm">{{ authStore.currentUser()?.email }}</p>
                    <p class="text-slate-500 text-xs mt-1">Click avatar to upload new photo (max 5MB)</p>
                </div>
            </div>

            <!-- Status selector -->
            <div class="mt-5 pt-5 border-t border-white/[0.06]">
                <p class="text-slate-400 text-xs mb-3 font-medium uppercase tracking-widest">Status</p>
                <div class="flex flex-wrap gap-2">
                    <button *ngFor="let opt of statusOptions" (click)="setStatus(opt.value)"
                        class="flex items-center gap-2 px-3 py-1.5 rounded-xl border text-xs font-medium transition-all"
                        [ngClass]="presenceService.getStatus(authStore.currentUser()?.userId || '') === opt.value
              ? 'bg-white/10 border-white/20 text-white'
              : 'bg-white/[0.04] border-white/[0.08] text-slate-400 hover:text-white hover:bg-white/[0.07]'">
                        <span class="w-2 h-2 rounded-full shrink-0" [ngClass]="opt.color"></span>
                        {{ opt.label }}
                    </button>
                </div>
            </div>
        </div>

        <!-- ── PROFILE FORM ── -->
        <div class="bg-white/[0.04] border border-white/[0.08] rounded-2xl p-6">
            <h3 class="text-white font-semibold text-sm mb-5 flex items-center gap-2">
                <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                Profile Information
            </h3>

            <form [formGroup]="profileForm" (ngSubmit)="saveProfile()" class="space-y-4">
                <div>
                    <label class="text-slate-400 text-xs mb-1.5 block">Full Name</label>
                    <input formControlName="fullName" type="text"
                        class="w-full bg-white/5 border border-white/10 text-white placeholder-slate-500 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                        [class.border-red-500]="isInvalid(profileForm, 'fullName')" />
                </div>

                <div>
                    <label class="text-slate-400 text-xs mb-1.5 block">Username</label>
                    <input formControlName="username" type="text"
                        class="w-full bg-white/5 border border-white/10 text-white placeholder-slate-500 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                        [class.border-red-500]="isInvalid(profileForm, 'username')" />
                </div>

                <div>
                    <label class="text-slate-400 text-xs mb-1.5 block">Bio</label>
                    <textarea formControlName="bio" rows="3" placeholder="Tell others a bit about yourself..."
                        class="w-full bg-white/5 border border-white/10 text-white placeholder-slate-500 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all resize-none">
          </textarea>
                </div>

                <button type="submit" [disabled]="savingProfile || profileForm.invalid"
                    class="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed text-white py-2.5 rounded-xl text-sm font-semibold transition-all">
                    <span *ngIf="!savingProfile">Save Profile</span>
                    <span *ngIf="savingProfile" class="flex items-center justify-center gap-2">
                        <svg class="animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
                        </svg>
                        Saving...
                    </span>
                </button>
            </form>
        </div>

        <!-- ── CHANGE PASSWORD ── -->
        <div class="bg-white/[0.04] border border-white/[0.08] rounded-2xl p-6">
            <h3 class="text-white font-semibold text-sm mb-5 flex items-center gap-2">
                <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                Change Password
            </h3>

            <form [formGroup]="passwordForm" (ngSubmit)="changePassword()" class="space-y-4">
                <div>
                    <label class="text-slate-400 text-xs mb-1.5 block">Current Password</label>
                    <input formControlName="currentPassword" type="password"
                        class="w-full bg-white/5 border border-white/10 text-white placeholder-slate-500 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                        [class.border-red-500]="isInvalid(passwordForm, 'currentPassword')" />
                </div>

                <div>
                    <label class="text-slate-400 text-xs mb-1.5 block">New Password</label>
                    <input formControlName="newPassword" type="password"
                        class="w-full bg-white/5 border border-white/10 text-white placeholder-slate-500 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                        [class.border-red-500]="isInvalid(passwordForm, 'newPassword')" />
                    <p *ngIf="isInvalid(passwordForm, 'newPassword')" class="text-red-400 text-xs mt-1 ml-1">Minimum 6
                        characters</p>
                </div>

                <div>
                    <label class="text-slate-400 text-xs mb-1.5 block">Confirm New Password</label>
                    <input formControlName="confirmPassword" type="password"
                        class="w-full bg-white/5 border border-white/10 text-white placeholder-slate-500 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                        [class.border-red-500]="passwordForm.hasError('passwordMismatch') && passwordForm.get('confirmPassword')?.touched" />
                    <p *ngIf="passwordForm.hasError('passwordMismatch') && passwordForm.get('confirmPassword')?.touched"
                        class="text-red-400 text-xs mt-1 ml-1">Passwords do not match</p>
                </div>

                <button type="submit" [disabled]="savingPassword || passwordForm.invalid"
                    class="w-full bg-slate-700 hover:bg-slate-600 disabled:opacity-50 disabled:cursor-not-allowed text-white py-2.5 rounded-xl text-sm font-semibold transition-all">
                    <span *ngIf="!savingPassword">Change Password</span>
                    <span *ngIf="savingPassword" class="flex items-center justify-center gap-2">
                        <svg class="animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
                        </svg>
                        Changing...
                    </span>
                </button>
            </form>
        </div>

    </div>
</div>
