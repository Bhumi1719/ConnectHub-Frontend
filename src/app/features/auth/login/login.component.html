<div
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 px-4">

    <!-- Decorative blobs -->
    <div
        class="absolute top-0 left-0 w-96 h-96 bg-blue-600 opacity-10 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2">
    </div>
    <div
        class="absolute bottom-0 right-0 w-96 h-96 bg-cyan-500 opacity-10 rounded-full blur-3xl translate-x-1/2 translate-y-1/2">
    </div>

    <div class="relative w-full max-w-md">

        <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl p-8">

            <!-- Logo -->
            <div class="text-center mb-8">
                <div
                    class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-blue-600 shadow-lg shadow-blue-600/30 mb-4">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a2 2 0 01-2-2v-1M7 8H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l4-4h4a2 2 0 002-2V8a2 2 0 00-2-2H7z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-white tracking-tight">ConnectHub</h1>
                <p class="text-slate-400 text-sm mt-1">Welcome back</p>
            </div>

            <!-- Google -->
            <button (click)="googleLogin()"
                class="w-full flex items-center justify-center gap-3 bg-white/10 hover:bg-white/15 border border-white/10 text-white py-2.5 rounded-xl transition-all duration-200 mb-6 text-sm font-medium">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Continue with Google
            </button>

            <!-- Divider -->
            <div class="flex items-center gap-3 mb-6">
                <div class="flex-1 h-px bg-white/10"></div>
                <span class="text-slate-500 text-xs">or sign in with email</span>
                <div class="flex-1 h-px bg-white/10"></div>
            </div>

            <!-- Form -->
            <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

                <div>
                    <input formControlName="email" placeholder="Email address" type="email"
                        class="w-full bg-white/5 border border-white/10 text-white placeholder-slate-500 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                        [class.border-red-500]="isInvalid('email')" />
                    <p *ngIf="isInvalid('email')" class="text-red-400 text-xs mt-1 ml-1">Valid email is required</p>
                </div>

                <div>
                    <input formControlName="password" placeholder="Password" type="password"
                        class="w-full bg-white/5 border border-white/10 text-white placeholder-slate-500 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                        [class.border-red-500]="isInvalid('password')" />
                    <p *ngIf="isInvalid('password')" class="text-red-400 text-xs mt-1 ml-1">Password is required</p>
                </div>

                <!-- Error -->
                <div *ngIf="errorMessage"
                    class="flex items-center gap-2 bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-3">
                    <svg class="w-4 h-4 text-red-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <p class="text-red-400 text-sm">{{ errorMessage }}</p>
                </div>

                <button type="submit" [disabled]="loading"
                    class="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-60 disabled:cursor-not-allowed text-white py-2.5 rounded-xl font-semibold text-sm transition-all duration-200 shadow-lg shadow-blue-600/20 mt-2">
                    <span *ngIf="!loading">Sign In</span>
                    <span *ngIf="loading" class="flex items-center justify-center gap-2">
                        <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
                        </svg>
                        Signing In...
                    </span>
                </button>

            </form>

            <p class="text-center text-slate-400 text-sm mt-6">
                Don't have an account?
                <a routerLink="/register"
                    class="text-blue-400 hover:text-blue-300 font-medium transition-colors">Register</a>
            </p>

        </div>
    </div>
</div>
